# .coderabbit.yaml
language: "en-US"
reviews:
  profile: "chill"          # options: chill | assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false               # disable the fun poem in summaries
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - "!**/*.lock"
    - "!**/node_modules/**"
    - "!**/dist/**"
  auto_review:
    enabled: true
    drafts: false           # skip draft PRs
chat:
  auto_reply: true
