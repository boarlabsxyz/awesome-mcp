<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integrations - Google Docs MCP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .nav {
      padding: 1.25rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-brand {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      text-decoration: none;
    }
    .nav-right { display: flex; gap: 1rem; align-items: center; }
    .nav-secondary {
      color: #555;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .nav-secondary:hover { color: #222; }
    .nav-link {
      padding: 0.5rem 1.25rem;
      background: #4285F4;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .nav-link:hover { background: #3367d6; }

    .page-header {
      text-align: center;
      padding: 3rem 0 2rem;
    }
    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .page-header p {
      font-size: 1.05rem;
      color: #555;
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .integrations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.25rem;
      padding-bottom: 3rem;
    }
    .integration-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .integration-head {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }
    .integration-icon {
      width: 40px;
      height: 40px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .integration-icon-fallback {
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      background: #eef2f7;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .integration-title {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .integration-title h3 {
      font-size: 1.05rem;
      font-weight: 600;
    }
    .provider-badge {
      display: inline-block;
      padding: 0.1rem 0.55rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 500;
      background: #eef2f7;
      color: #4b5b6d;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      align-self: flex-start;
    }
    .integration-tagline {
      font-size: 0.92rem;
      color: #555;
      line-height: 1.5;
    }
    .section-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }
    .scope-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .scope-chip {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      font-size: 0.75rem;
      background: #f1f4f9;
      color: #455064;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
    }
    .scope-empty, .prompt-empty {
      font-size: 0.82rem;
      color: #888;
      font-style: italic;
    }
    .prompt-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .prompt-list li {
      font-size: 0.85rem;
      color: #444;
      background: #fafbfc;
      border-left: 3px solid #d9e1ec;
      padding: 0.45rem 0.6rem;
      border-radius: 4px;
      line-height: 1.4;
    }
    .integration-cta {
      margin-top: auto;
      display: inline-block;
      padding: 0.55rem 1rem;
      background: #4285F4;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      text-align: center;
      transition: background 0.2s;
    }
    .integration-cta:hover { background: #3367d6; }

    .loading, .error {
      text-align: center;
      padding: 3rem 1rem;
      color: #666;
      font-size: 0.95rem;
    }
    .error { color: #c0392b; }

    .footer {
      text-align: center;
      padding: 1.5rem 0;
      border-top: 1px solid #ddd;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="/" class="nav-brand">Google Docs MCP</a>
      <div class="nav-right">
        <a href="/" class="nav-secondary">Home</a>
        <a href="/dashboard" class="nav-link">Dashboard</a>
      </div>
    </nav>

    <header class="page-header">
      <h1>Integrations</h1>
      <p>Every service you can connect to your AI assistant through the Model Context Protocol. Pick one to see what it can do, then set it up from your dashboard.</p>
    </header>

    <div id="grid" class="integrations-grid">
      <div class="loading">Loading integrations…</div>
    </div>

    <footer class="footer">
      &copy; 2026 Google Docs MCP
    </footer>
  </div>

  <script>
    const PROVIDER_LABELS = {
      'google': 'Google OAuth',
      'clickup': 'ClickUp OAuth',
      'slack': 'Slack OAuth',
      'slack-bot': 'Slack Bot Token',
    };

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function shortenScope(scope) {
      // Trim noisy Google scope prefixes for display.
      return scope.replace('https://www.googleapis.com/auth/', '');
    }

    function iconHtml(mcp) {
      if (mcp.iconUrl) {
        return `<img class="integration-icon" src="${escapeHtml(mcp.iconUrl)}" alt="${escapeHtml(mcp.name)} icon" onerror="this.outerHTML='<span class=\\'integration-icon-fallback\\'>🔌</span>'">`;
      }
      return '<span class="integration-icon-fallback">🔌</span>';
    }

    function renderCard(mcp) {
      const providerLabel = PROVIDER_LABELS[mcp.provider] || mcp.provider || 'Custom';
      const scopes = Array.isArray(mcp.scopes) ? mcp.scopes : [];
      const prompts = Array.isArray(mcp.samplePrompts) ? mcp.samplePrompts : [];

      const scopesHtml = scopes.length
        ? `<div class="scope-list">${scopes
            .map(s => `<span class="scope-chip">${escapeHtml(shortenScope(s))}</span>`)
            .join('')}</div>`
        : `<div class="scope-empty">No OAuth scopes (uses a workspace token)</div>`;

      const promptsHtml = prompts.length
        ? `<ul class="prompt-list">${prompts
            .map(p => `<li>${escapeHtml(p)}</li>`)
            .join('')}</ul>`
        : `<div class="prompt-empty">Sample prompts coming soon.</div>`;

      return `
        <article class="integration-card">
          <div class="integration-head">
            ${iconHtml(mcp)}
            <div class="integration-title">
              <h3>${escapeHtml(mcp.name)}</h3>
              <span class="provider-badge">${escapeHtml(providerLabel)}</span>
            </div>
          </div>
          <p class="integration-tagline">${escapeHtml(mcp.description || '')}</p>
          <div>
            <div class="section-label">Scopes requested</div>
            ${scopesHtml}
          </div>
          <div>
            <div class="section-label">Sample prompts</div>
            ${promptsHtml}
          </div>
          <a class="integration-cta" href="/dashboard?add=${encodeURIComponent(mcp.slug)}">Set up in dashboard →</a>
        </article>
      `;
    }

    async function load() {
      const grid = document.getElementById('grid');
      try {
        const res = await fetch('/api/v1/catalogs');
        if (!res.ok) throw new Error('Catalog request failed: ' + res.status);
        const data = await res.json();
        const items = (data.catalogs || []).slice().sort((a, b) => a.name.localeCompare(b.name));
        if (!items.length) {
          grid.innerHTML = '<div class="loading">No integrations available yet.</div>';
          return;
        }
        grid.innerHTML = items.map(renderCard).join('');
      } catch (err) {
        console.error(err);
        grid.innerHTML = '<div class="error">Could not load integrations. Please try again later.</div>';
      }
    }

    load();
  </script>
</body>
</html>
