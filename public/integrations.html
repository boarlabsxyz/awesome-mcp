<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integrations - Awesome MCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #ededed;
      min-height: 100vh;
    }

    .page-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(0,0,0,0.8);
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header h1 a {
      color: inherit;
      text-decoration: none;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-link {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.15s;
    }
    .nav-link:hover { color: #ededed; }
    .btn-primary {
      padding: 0.5rem 1rem;
      background: #0070f3;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #005bb5; }

    .page-intro {
      margin-bottom: 2rem;
    }
    .page-intro h2 {
      font-size: 1.1rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .page-intro p {
      font-size: 0.95rem;
      color: #aaa;
      max-width: 700px;
      line-height: 1.6;
    }

    .integrations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1rem;
    }
    .integration-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .integration-card:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.15);
    }
    .integration-head {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }
    .integration-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .integration-icon img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }
    .integration-icon-fallback {
      font-size: 1.4rem;
    }
    .integration-title {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 0;
    }
    .integration-title h3 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .provider-badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 500;
      background: rgba(0,112,243,0.15);
      color: #4ea3ff;
      border: 1px solid rgba(0,112,243,0.3);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      align-self: flex-start;
    }
    .integration-tagline {
      font-size: 0.9rem;
      color: #aaa;
      line-height: 1.5;
    }
    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    .scope-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .scope-chip {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      font-size: 0.72rem;
      background: rgba(255,255,255,0.06);
      color: #c8c8c8;
      border: 1px solid rgba(255,255,255,0.08);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
    }
    .scope-empty, .prompt-empty {
      font-size: 0.82rem;
      color: #666;
      font-style: italic;
    }
    .prompt-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .prompt-list li {
      font-size: 0.85rem;
      color: #cfcfcf;
      background: rgba(255,255,255,0.04);
      border-left: 3px solid rgba(0,112,243,0.6);
      padding: 0.5rem 0.65rem;
      border-radius: 4px;
      line-height: 1.45;
    }
    .integration-cta {
      margin-top: auto;
      display: inline-block;
      padding: 0.6rem 1rem;
      background: #0070f3;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      text-align: center;
      transition: background 0.2s;
    }
    .integration-cta:hover { background: #005bb5; }

    .state {
      text-align: center;
      padding: 3rem 1rem;
      font-size: 0.95rem;
      color: #888;
    }
    .state.error { color: #dc3545; }

    .footer {
      text-align: center;
      padding: 2rem 0 0.5rem;
      margin-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <header class="header">
      <h1><a href="/">Awesome MCP</a></h1>
      <div class="header-right">
        <a href="/" class="nav-link">Home</a>
        <a href="/dashboard" class="btn-primary">Dashboard</a>
      </div>
    </header>

    <section class="page-intro">
      <h2>Integrations</h2>
      <p>Every service you can connect to your AI assistant through the Model Context Protocol. Pick one to see what it can do, then set it up from your dashboard.</p>
    </section>

    <div id="grid" class="integrations-grid">
      <div class="state">Loading integrations…</div>
    </div>

    <footer class="footer">
      &copy; 2026 Awesome MCP
    </footer>
  </div>

  <script>
    const PROVIDER_LABELS = {
      'google': 'Google OAuth',
      'clickup': 'ClickUp OAuth',
      'slack': 'Slack OAuth',
      'slack-bot': 'Slack Bot Token',
    };

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function shortenScope(scope) {
      return scope.replace('https://www.googleapis.com/auth/', '');
    }

    function iconHtml(mcp) {
      if (mcp.iconUrl) {
        return `<div class="integration-icon"><img src="${escapeHtml(mcp.iconUrl)}" alt="${escapeHtml(mcp.name)} icon" onerror="this.outerHTML='<span class=\\'integration-icon-fallback\\'>🔌</span>'"></div>`;
      }
      return '<div class="integration-icon"><span class="integration-icon-fallback">🔌</span></div>';
    }

    function renderCard(mcp) {
      const providerLabel = PROVIDER_LABELS[mcp.provider] || mcp.provider || 'Custom';
      const scopes = Array.isArray(mcp.scopes) ? mcp.scopes : [];
      const prompts = Array.isArray(mcp.samplePrompts) ? mcp.samplePrompts : [];

      const scopesHtml = scopes.length
        ? `<div class="scope-list">${scopes
            .map(s => `<span class="scope-chip">${escapeHtml(shortenScope(s))}</span>`)
            .join('')}</div>`
        : `<div class="scope-empty">No OAuth scopes (uses a workspace token)</div>`;

      const promptsHtml = prompts.length
        ? `<ul class="prompt-list">${prompts
            .map(p => `<li>${escapeHtml(p)}</li>`)
            .join('')}</ul>`
        : `<div class="prompt-empty">Sample prompts coming soon.</div>`;

      return `
        <article class="integration-card">
          <div class="integration-head">
            ${iconHtml(mcp)}
            <div class="integration-title">
              <h3>${escapeHtml(mcp.name)}</h3>
              <span class="provider-badge">${escapeHtml(providerLabel)}</span>
            </div>
          </div>
          <p class="integration-tagline">${escapeHtml(mcp.description || '')}</p>
          <div>
            <div class="section-label">Scopes requested</div>
            ${scopesHtml}
          </div>
          <div>
            <div class="section-label">Sample prompts</div>
            ${promptsHtml}
          </div>
          <a class="integration-cta" href="/dashboard?add=${encodeURIComponent(mcp.slug)}">Set up in dashboard →</a>
        </article>
      `;
    }

    async function load() {
      const grid = document.getElementById('grid');
      try {
        const res = await fetch('/api/v1/catalogs');
        if (!res.ok) throw new Error('Catalog request failed: ' + res.status);
        const data = await res.json();
        const items = (data.catalogs || []).slice().sort((a, b) => a.name.localeCompare(b.name));
        if (!items.length) {
          grid.innerHTML = '<div class="state">No integrations available yet.</div>';
          return;
        }
        grid.innerHTML = items.map(renderCard).join('');
      } catch (err) {
        console.error(err);
        grid.innerHTML = '<div class="state error">Could not load integrations. Please try again later.</div>';
      }
    }

    load();
  </script>
</body>
</html>
