name: Create Tag (CI-gated)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. qa-20260513, v1.0.0)'
        required: true
        type: string
      ref:
        description: 'Branch or SHA to tag'
        required: true
        type: string

jobs:
  validate-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref to SHA
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const ref = '${{ inputs.ref }}';
            let sha;
            try {
              const { data } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: ref
              });
              sha = data.sha;
            } catch (e) {
              core.setFailed(`Could not resolve ref "${ref}": ${e.message}`);
              return;
            }
            core.setOutput('sha', sha);
            console.log(`Resolved "${ref}" → ${sha}`);

      - name: Check CI passed on commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.resolve.outputs.sha }}';
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              filter: 'latest'
            });

            const required = ['lint', 'typecheck', 'test', 'build'];
            const results = {};
            for (const run of checkRuns.check_runs) {
              results[run.name] = run.conclusion;
            }

            console.log('Check results:', JSON.stringify(results, null, 2));

            const missing = required.filter(name => !results[name]);
            const failed = required.filter(name => results[name] && results[name] !== 'success');

            if (missing.length > 0) {
              core.setFailed(`Missing CI checks: ${missing.join(', ')}. Push the commit to trigger CI first.`);
              return;
            }
            if (failed.length > 0) {
              core.setFailed(`Failed CI checks: ${failed.map(n => `${n}=${results[n]}`).join(', ')}`);
              return;
            }

            console.log('All required CI checks passed.');

  validate-release-tag:
    if: startsWith(inputs.tag, 'v')
    needs: [validate-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Verify ref is a release branch
        run: |
          REF="${{ inputs.ref }}"
          if [[ ! "$REF" =~ ^release- ]]; then
            echo "::error::v* tags can only be created on release-* branches. Got: $REF"
            exit 1
          fi

  create-tag:
    needs: [validate-ci, validate-release-tag]
    if: |
      always() &&
      needs.validate-ci.result == 'success' &&
      (needs.validate-release-tag.result == 'success' || needs.validate-release-tag.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Create and push tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ inputs.tag }}';
            const ref = '${{ inputs.ref }}';

            // Resolve to SHA
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: ref
            });

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: commit.sha
            });

            console.log(`Created tag ${tag} → ${commit.sha} (on ${ref})`);
