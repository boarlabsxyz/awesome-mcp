name: Create Tag (CI-gated)

# Tagging IS the release. Flow:
#   1. validate-ci         — required CI checks must be green on the ref the user picked
#   2. update-release-notes — generate the vX.Y.Z block, inject into public/updates.html,
#                             commit + push to main (so the deployed code carries the entry)
#   3. create-tag          — tag the docs commit (the new main HEAD)
#
# When the tag push triggers deploy-prod.yml it ships main HEAD, which already
# contains the updates entry — so /updates on prod is never one version behind.
# Slack + email notifications are handled separately by release-notes.yml on tag push.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.0.0)'
        required: true
        type: string
      ref:
        description: 'Must resolve to current main HEAD (other refs are rejected)'
        required: true
        type: string
        default: main

permissions:
  contents: read
  checks: read

jobs:
  validate-ci:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve ref to SHA
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const ref = '${{ inputs.ref }}';
            let sha;
            try {
              const { data } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: ref
              });
              sha = data.sha;
            } catch (e) {
              core.setFailed(`Could not resolve ref "${ref}": ${e.message}`);
              return;
            }
            core.setOutput('sha', sha);
            console.log(`Resolved "${ref}" → ${sha}`);

      - name: Check CI passed on commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.resolve.outputs.sha }}';
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              filter: 'latest'
            });

            const required = ['lint', 'typecheck', 'test', 'build'];
            const results = {};
            for (const run of checkRuns.check_runs) {
              results[run.name] = run.conclusion;
            }

            console.log('Check results:', JSON.stringify(results, null, 2));

            const missing = required.filter(name => !results[name]);
            const failed = required.filter(name => results[name] && results[name] !== 'success');

            if (missing.length > 0) {
              core.setFailed(`Missing CI checks: ${missing.join(', ')}. Push the commit to trigger CI first.`);
              return;
            }
            if (failed.length > 0) {
              core.setFailed(`Failed CI checks: ${failed.map(n => `${n}=${results[n]}`).join(', ')}`);
              return;
            }

            console.log('All required CI checks passed.');

  update-release-notes:
    needs: [validate-ci]
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          # PAT_TOKEN is needed to push to main (branch protection bypass).
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Require validated ref to be on main HEAD
        env:
          VALIDATED_SHA: ${{ needs.validate-ci.outputs.sha }}
        run: |
          MAIN_SHA=$(git rev-parse HEAD)
          if [ "$MAIN_SHA" != "$VALIDATED_SHA" ]; then
            echo "Refusing to tag: validated ref ${VALIDATED_SHA} is not current main HEAD ${MAIN_SHA}."
            echo "create-tag.yml only supports tagging the current tip of main."
            exit 1
          fi

      - name: Determine previous tag and commit range
        id: range
        run: |
          PREVIOUS_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)
          echo "previous=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "range=${PREVIOUS_TAG}..HEAD" >> "$GITHUB_OUTPUT"
          else
            echo "range=" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect commits and parse ClickUp IDs
        id: commits
        env:
          # Pass via env + quoted shell var so a hostile tag name can't break out of the shell context.
          RANGE: ${{ steps.range.outputs.range }}
        run: |
          if [ -n "$RANGE" ]; then
            git log "$RANGE" --pretty=format:"%H%x1f%s%x1f%b%x1e" --no-merges > /tmp/commits_raw.txt
          else
            git log --pretty=format:"%H%x1f%s%x1f%b%x1e" --no-merges > /tmp/commits_raw.txt
          fi
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/commits_raw.txt', 'utf8');
            const records = raw.split('\x1e').filter(r => r.trim());
            const lines = records.map(r => {
              const [hash, subject, ...bodyParts] = r.split('\x1f');
              const body = bodyParts.join(' ').replace(/\n/g, ' ').trim();
              return [hash.trim(), subject.trim(), body].join('|');
            });
            fs.writeFileSync('/tmp/commits.txt', lines.join('\n'));
          "
          if [ -n "$RANGE" ]; then
            ALL_TEXT=$(git log "$RANGE" --pretty=format:"%s %b")
          else
            ALL_TEXT=$(git log --pretty=format:"%s %b")
          fi
          TASK_IDS=$(echo "$ALL_TEXT" | grep -oi 'CU-[a-z0-9]\+' | tr '[:upper:]' '[:lower:]' | sed 's/cu-//' | sort -u | tr '\n' ',' | sed 's/,$//' || true)
          echo "task_ids=$TASK_IDS" >> "$GITHUB_OUTPUT"

      - name: Fetch ClickUp task titles
        if: steps.commits.outputs.task_ids != ''
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        run: |
          IFS=',' read -ra IDS <<< "${{ steps.commits.outputs.task_ids }}"
          > /tmp/task_map.txt
          for id in "${IDS[@]}"; do
            RESPONSE=$(curl -s -H "Authorization: Bearer ${CLICKUP_API_TOKEN}" \
              "https://api.clickup.com/api/v2/task/${id}" || echo '{}')
            TITLE=$(echo "$RESPONSE" | jq -r '.name // empty')
            URL=$(echo "$RESPONSE" | jq -r '.url // empty')
            if [ -n "$TITLE" ]; then
              echo "${id}|${TITLE}|${URL}" >> /tmp/task_map.txt
            fi
            sleep 0.2
          done

      - name: Generate release notes
        env:
          TAG: ${{ inputs.tag }}
        run: |
          # Stamp today as the release date and persist it so release-notes.yml
          # reuses the same value when it regenerates outputs for notifications.
          RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "$RELEASE_DATE" > /tmp/release_date.txt
          node .github/scripts/generate-release-notes.mjs \
            --tag "$TAG" \
            --date "$RELEASE_DATE" \
            --commits /tmp/commits.txt \
            --tasks /tmp/task_map.txt \
            --output-dir /tmp/release

      - name: Inject release block into updates.html
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('public/updates.html', 'utf8');
            const block = fs.readFileSync('/tmp/release/updates-block.html', 'utf8');
            const marker = '<div id=\"releases\">';
            const updated = html.replace(marker, marker + '\n' + block);
            fs.writeFileSync('public/updates.html', updated);
          "

      - name: Commit and push updates.html to main
        id: commit
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/updates.html
          if git diff --cached --quiet; then
            echo "No changes to updates.html — tagging current main HEAD."
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            git commit -m "docs: release notes for ${TAG}"
            git push origin main
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

  create-tag:
    needs: [validate-ci, update-release-notes]
    runs-on: ubuntu-latest
    steps:
      - name: Create and push tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const tag = '${{ inputs.tag }}';
            const sha = '${{ needs.update-release-notes.outputs.release_sha }}';

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: sha
            });

            console.log(`Created tag ${tag} → ${sha}`);
