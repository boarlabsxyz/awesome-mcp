name: E2E Regression (Nightly)

# Runs the full e2e test glob (tests/**/*.smoke.ts) once per night against the
# dev MCP. Independent of the deploy gate - failures here do NOT block prod
# tagging. They post to Slack so the team sees them in the morning and can
# triage from the forensics artifact on the run page.
#
# As Phase 3 adds more tests (one per Google Docs tool), this is the workflow
# that exercises them. The deploy gate stays at the 1 read + 1 write minimum.

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git SHA to test (defaults to current main)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  claude-desktop:
    runs-on: [self-hosted, macOS, mac-studio]
    timeout-minutes: 60
    env:
      CLIENT: claude-desktop
      ARTIFACTS_DIR: ${{ github.workspace }}/e2e/.artifacts
      APPIUM_HOST: 127.0.0.1
      APPIUM_PORT: '4723'
      RESPONSE_TIMEOUT_MS: '120000'
      E2E_FIXTURE_DOC_ID: ${{ vars.E2E_FIXTURE_DOC_ID }}
      E2E_FIXTURE_DOC_NEEDLE: ${{ vars.E2E_FIXTURE_DOC_NEEDLE }}
      E2E_SCRATCH_FOLDER_ID: ${{ vars.E2E_SCRATCH_FOLDER_ID }}
      E2E_WRITE_GOOGLE_REFRESH_TOKEN: ${{ secrets.E2E_WRITE_GOOGLE_REFRESH_TOKEN }}
      E2E_GOOGLE_CLIENT_ID: ${{ secrets.E2E_GOOGLE_CLIENT_ID }}
      E2E_GOOGLE_CLIENT_SECRET: ${{ secrets.E2E_GOOGLE_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pre-flight - Appium reachable
        run: |
          curl --fail --silent --show-error --max-time 5 \
            "http://${APPIUM_HOST}:${APPIUM_PORT}/status" \
            | head -c 300

      - name: Install e2e deps
        working-directory: e2e
        run: npm install

      - name: Run full regression (Claude Desktop)
        id: tests
        working-directory: e2e
        run: npm run test:full

      - name: Upload forensics bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-regression-claude-desktop-${{ github.run_id }}
          path: e2e/.artifacts/**
          retention-days: 90
          if-no-files-found: warn

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_URL }}
        run: |
          curl --fail --silent --show-error -X POST -H 'Content-type: application/json' \
            --data "$(cat <<EOF
          {"text": ":rotating_light: E2E nightly regression FAILED (claude-desktop)\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nSee forensics artifact for details."}
          EOF
          )" \
            "$SLACK_WEBHOOK_URL"

  chatgpt-web:
    runs-on: [self-hosted, macOS, mac-studio]
    needs: [claude-desktop]
    # Advisory regardless of the gate's status - same posture as the smoke job.
    continue-on-error: true
    timeout-minutes: 60
    env:
      CLIENT: chatgpt-web
      ARTIFACTS_DIR: ${{ github.workspace }}/e2e/.artifacts
      CHATGPT_CDP_ENDPOINT: http://127.0.0.1:9222
      RESPONSE_TIMEOUT_MS: '120000'
      E2E_FIXTURE_DOC_ID: ${{ vars.E2E_FIXTURE_DOC_ID }}
      E2E_FIXTURE_DOC_NEEDLE: ${{ vars.E2E_FIXTURE_DOC_NEEDLE }}
      E2E_SCRATCH_FOLDER_ID: ${{ vars.E2E_SCRATCH_FOLDER_ID }}
      E2E_WRITE_GOOGLE_REFRESH_TOKEN: ${{ secrets.E2E_WRITE_GOOGLE_REFRESH_TOKEN }}
      E2E_GOOGLE_CLIENT_ID: ${{ secrets.E2E_GOOGLE_CLIENT_ID }}
      E2E_GOOGLE_CLIENT_SECRET: ${{ secrets.E2E_GOOGLE_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pre-flight - Chrome CDP reachable
        run: |
          curl --fail --silent --show-error --max-time 5 \
            "${CHATGPT_CDP_ENDPOINT}/json/version" \
            | head -c 300

      - name: Install e2e deps
        working-directory: e2e
        run: npm install

      - name: Run full regression (ChatGPT web)
        working-directory: e2e
        run: npm run test:full

      - name: Upload forensics bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-regression-chatgpt-web-${{ github.run_id }}
          path: e2e/.artifacts/**
          retention-days: 90
          if-no-files-found: warn

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_URL }}
        run: |
          curl --fail --silent --show-error -X POST -H 'Content-type: application/json' \
            --data "$(cat <<EOF
          {"text": ":warning: E2E nightly regression failed (chatgpt-web, advisory)\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
          EOF
          )" \
            "$SLACK_WEBHOOK_URL"
