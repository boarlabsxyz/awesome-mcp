name: Release Notifications

# Sends Slack + email announcements for a tag.
#
# Updating public/updates.html and deploying prod are NOT this workflow's job —
# create-tag.yml writes the release block into main BEFORE the tag exists, and
# the tag push triggers deploy-prod.yml on its own. Here we just regenerate the
# Slack/email artifacts from the same commit range (using the tag's commit date
# so output matches what create-tag wrote) and wait for human approval before
# blasting them out.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)send notifications for'
        required: true
        type: string
      test:
        description: 'Test mode — send emails only to test addresses'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    environment: release-approval
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Resolve tag and commit range
        id: tags
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "${DISPATCH_TAG:-}" ]; then
            CURRENT_TAG="$DISPATCH_TAG"
          else
            CURRENT_TAG="${GITHUB_REF_NAME}"
          fi
          if ! git rev-parse "refs/tags/${CURRENT_TAG}" >/dev/null 2>&1; then
            echo "Tag ${CURRENT_TAG} does not exist."
            exit 1
          fi
          # Find the tag immediately preceding CURRENT_TAG in version order, not just the newest tag.
          # On a manual rerun for an older tag (e.g. v0.5.0 with v0.6.x already shipped) the old
          # "newest tag != current" logic would point at a newer tag, producing an empty range.
          PREVIOUS_TAG=$(git tag -l 'v*' --sort=-version:refname | awk -v cur="$CURRENT_TAG" 'found {print; exit} $0 == cur {found=1}')
          # Use the tag's commit date as the release date so regenerated
          # output matches what create-tag.yml wrote into updates.html.
          TAG_DATE=$(git log -1 --format=%cI "${CURRENT_TAG}")
          echo "current=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "date=$TAG_DATE" >> "$GITHUB_OUTPUT"
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "range=${PREVIOUS_TAG}..${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "range=" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect commits and parse ClickUp IDs
        id: commits
        env:
          # Pass via env + quoted shell var so a hostile tag name can't break out of the shell context.
          RANGE: ${{ steps.tags.outputs.range }}
        run: |
          if [ -n "$RANGE" ]; then
            git log "$RANGE" --pretty=format:"%H%x1f%s%x1f%b%x1e" --no-merges > /tmp/commits_raw.txt
          else
            git log --pretty=format:"%H%x1f%s%x1f%b%x1e" --no-merges > /tmp/commits_raw.txt
          fi
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/commits_raw.txt', 'utf8');
            const records = raw.split('\x1e').filter(r => r.trim());
            const lines = records.map(r => {
              const [hash, subject, ...bodyParts] = r.split('\x1f');
              const body = bodyParts.join(' ').replace(/\n/g, ' ').trim();
              return [hash.trim(), subject.trim(), body].join('|');
            });
            fs.writeFileSync('/tmp/commits.txt', lines.join('\n'));
          "
          if [ -n "$RANGE" ]; then
            ALL_TEXT=$(git log "$RANGE" --pretty=format:"%s %b")
          else
            ALL_TEXT=$(git log --pretty=format:"%s %b")
          fi
          TASK_IDS=$(echo "$ALL_TEXT" | grep -oi 'CU-[a-z0-9]\+' | tr '[:upper:]' '[:lower:]' | sed 's/cu-//' | sort -u | tr '\n' ',' | sed 's/,$//' || true)
          echo "task_ids=$TASK_IDS" >> "$GITHUB_OUTPUT"

      - name: Fetch ClickUp task titles
        if: steps.commits.outputs.task_ids != ''
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        run: |
          IFS=',' read -ra IDS <<< "${{ steps.commits.outputs.task_ids }}"
          > /tmp/task_map.txt
          for id in "${IDS[@]}"; do
            RESPONSE=$(curl -s -H "Authorization: Bearer ${CLICKUP_API_TOKEN}" \
              "https://api.clickup.com/api/v2/task/${id}" || echo '{}')
            TITLE=$(echo "$RESPONSE" | jq -r '.name // empty')
            URL=$(echo "$RESPONSE" | jq -r '.url // empty')
            if [ -n "$TITLE" ]; then
              echo "${id}|${TITLE}|${URL}" >> /tmp/task_map.txt
            fi
            sleep 0.2
          done

      - name: Generate release notes
        env:
          # When set, generate-release-notes.mjs asks Claude (via OpenRouter) to rewrite
          # the commit list into a user-facing summary (drops chores/refactors/CI/internal
          # fixes). If missing or the API call fails, the script falls back to
          # conventional-commit categorization.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          node .github/scripts/generate-release-notes.mjs \
            --tag "${{ steps.tags.outputs.current }}" \
            --date "${{ steps.tags.outputs.date }}" \
            --commits /tmp/commits.txt \
            --tasks /tmp/task_map.txt \
            --output-dir /tmp/release

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-notes
          path: /tmp/release/
          retention-days: 30

      - name: Post to Slack
        # Uses chat.postMessage (bot token) instead of an Incoming Webhook so
        # the target channel can be a Slack Connect (external) channel — those
        # aren't addressable by webhooks.
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          if [ -f /tmp/release/slack-message.txt ]; then
            SLACK_TEXT=$(cat /tmp/release/slack-message.txt)
            PAYLOAD=$(jq -n --arg ch "$SLACK_CHANNEL_ID" --arg text "$SLACK_TEXT" \
              '{channel: $ch, text: $text}')
            RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H 'Content-type: application/json; charset=utf-8' \
              -d "${PAYLOAD}") || true
            echo "Slack response: $RESPONSE"
            if [ "$(echo "$RESPONSE" | jq -r '.ok')" != "true" ]; then
              echo "::warning::Slack chat.postMessage did not succeed"
            fi
          fi

      - name: Send email notifications
        env:
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          TEST_MODE: ${{ inputs.test == true && 'true' || 'false' }}
        run: |
          if [ -f /tmp/release/email-body.html ]; then
            APP_URL="${{ vars.APP_URL }}"
            EMAIL_HTML=$(cat /tmp/release/email-body.html)
            TAG="${{ steps.tags.outputs.current }}"
            curl -s -X POST "${APP_URL}/api/internal/release-notify" \
              -H "Authorization: Bearer ${INTERNAL_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg subject "Awesome MCP ${TAG} Released" \
                --arg body "$EMAIL_HTML" \
                --argjson test "${TEST_MODE}" \
                '{subject: $subject, body: $body, test: $test}')" || true
          fi
