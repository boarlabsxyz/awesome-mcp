name: Deploy → Prod

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (defaults to main HEAD)
        required: false
        type: string
        default: main

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
      railway_environment: production
      ref: ${{ inputs.ref || github.sha }}
    secrets: inherit
