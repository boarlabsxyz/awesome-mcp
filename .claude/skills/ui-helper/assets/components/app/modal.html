<!-- App modal. Mount inside body. Toggle .hidden on .modal-overlay to show/hide.
     For multi-step modals, add .modal-step blocks inside and toggle .active. -->
<div class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">{{title}}</h3>
      <button class="btn-close" type="button" aria-label="Close">&times;</button>
    </div>
    <!-- TODO: modal body -->
  </div>
</div>

<style>
.hidden { display: none !important; }
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal {
  background: #0a0a0a;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 2rem;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior: contain;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
}
.modal-header h3 { font-size: 1.2rem; letter-spacing: -0.02em; }
.btn-close {
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: #888;
  padding: 0.25rem 0.5rem;
  border-radius: 4px;
  line-height: 1;
  transition: background-color 0.2s, color 0.2s;
}
.btn-close:hover { background: rgba(255,255,255,0.05); color: #ededed; }
</style>
