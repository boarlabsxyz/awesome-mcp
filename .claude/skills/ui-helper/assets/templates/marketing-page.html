<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f5f5">
  <title>{{title}} - Google Docs MCP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    :focus-visible {
      outline: 2px solid #4285F4;
      outline-offset: 2px;
      border-radius: 4px;
    }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: 0;
    }
    .skip-link:focus {
      left: 8px;
      top: 8px;
      z-index: 10000;
      padding: 0.5rem 1rem;
      background: #4285F4;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .nav {
      padding: 1.25rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-brand {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      text-decoration: none;
    }
    .nav-link {
      padding: 0.5rem 1.25rem;
      background: #4285F4;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background-color 0.2s;
      touch-action: manipulation;
    }
    .nav-link:hover {
      background: #3367d6;
    }

    .footer {
      text-align: center;
      padding: 1.5rem 0;
      border-top: 1px solid #ddd;
      font-size: 0.8rem;
      color: #aaa;
    }

    /* TODO: page-specific styles below */

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="container">
    <nav class="nav" aria-label="Primary">
      <a href="/" class="nav-brand" translate="no">Google Docs MCP</a>
      <a href="https://app.awesome-mcp.xyz/dashboard" class="nav-link">Dashboard</a>
    </nav>

    <main id="main">
      <!-- TODO: page content -->
    </main>

    <footer class="footer">
      &copy; 2026 <span translate="no">Google Docs MCP</span>
    </footer>
  </div>
</body>
</html>
