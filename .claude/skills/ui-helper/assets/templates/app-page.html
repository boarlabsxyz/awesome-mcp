<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>{{title}} - Awesome MCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #ededed;
      min-height: 100vh;
    }

    :focus-visible {
      outline: 2px solid #0070f3;
      outline-offset: 2px;
      border-radius: 4px;
    }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: 0;
    }
    .skip-link:focus {
      left: 8px;
      top: 8px;
      z-index: 10000;
      padding: 0.5rem 1rem;
      background: #0070f3;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .page-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(0,0,0,0.8);
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header h1 a {
      color: inherit;
      text-decoration: none;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-link {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.15s;
      touch-action: manipulation;
    }
    .nav-link:hover { color: #ededed; }
    .btn-primary {
      padding: 0.5rem 1rem;
      background: #0070f3;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background-color 0.2s;
      touch-action: manipulation;
    }
    .btn-primary:hover { background: #005bb5; }

    /* TODO: page-specific styles below */
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div class="page-container">
    <header class="header">
      <h1><a href="/dashboard" translate="no">Awesome MCP</a></h1>
      <div class="header-right">
        <a href="/integrations" class="nav-link">Integrations</a>
        <a href="/dashboard" class="btn-primary">Dashboard</a>
      </div>
    </header>

    <main id="main">
      <!-- TODO: page content -->
    </main>
  </div>
</body>
</html>
